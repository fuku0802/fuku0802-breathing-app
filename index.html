<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>息 — 呼吸リラクゼーション</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#e8f1f2;
  --ink-dim:rgba(232,241,242,.55);
  --ink-faint:rgba(232,241,242,.28);
  --glow-a:#5eead4;
  --glow-b:#818cf8;
  --bg-0:#04070f;
  --bg-1:#0a1226;
  --bg-2:#0e1f33;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  color:var(--ink);
  background:radial-gradient(120% 90% at 50% 110%,var(--bg-2) 0%,var(--bg-1) 45%,var(--bg-0) 100%);
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

/* ---------- 背景の星と霧 ---------- */
.aurora{
  position:fixed;inset:-30%;pointer-events:none;z-index:0;
  background:
    radial-gradient(40% 30% at 30% 25%,rgba(94,234,212,.07),transparent 70%),
    radial-gradient(45% 35% at 72% 70%,rgba(129,140,248,.09),transparent 70%);
  animation:drift 26s ease-in-out infinite alternate;
  filter:blur(10px);
}
@keyframes drift{
  from{transform:translate3d(-2%, -1%,0) rotate(-1deg)}
  to{transform:translate3d(2%, 2%,0) rotate(1.5deg)}
}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ---------- レイアウト ---------- */
.app{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:560px;padding:24px}
header{position:fixed;top:28px;left:0;right:0;text-align:center;z-index:3}
header h1{
  font-family:'Shippori Mincho',serif;font-weight:500;font-size:15px;
  letter-spacing:.55em;text-indent:.55em;color:var(--ink-dim);
}
header p{font-size:11px;letter-spacing:.3em;text-indent:.3em;color:var(--ink-faint);margin-top:8px}

/* ---------- 呼吸オーブ ---------- */
.stage{position:relative;width:min(82vw,380px);aspect-ratio:1;display:grid;place-items:center}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(232,241,242,.07);
  transform:scale(var(--s,1));
}
.ring.r2{inset:-13%;border-color:rgba(232,241,242,.045)}
.ring.r3{inset:-27%;border-color:rgba(232,241,242,.03)}

svg.progress{position:absolute;inset:-6.5%;transform:rotate(-90deg);overflow:visible}
svg.progress circle{fill:none;stroke-width:1.6}
.track{stroke:rgba(232,241,242,.08)}
.arc{
  stroke:url(#grad);stroke-linecap:round;
  filter:drop-shadow(0 0 6px rgba(167,139,250,.45));
  transition:opacity .6s;
}

.orb-wrap{position:relative;width:58%;aspect-ratio:1;display:grid;place-items:center;will-change:transform}
.orb,.halo{position:absolute;border-radius:50%;opacity:0;transition:opacity 2.4s ease}
.orb{inset:0}
.halo{inset:-26%;filter:blur(14px)}
/* 吸う = ムラサキ */
.o-in{
  background:
    radial-gradient(circle at 38% 32%,rgba(255,255,255,.55),rgba(255,255,255,0) 32%),
    radial-gradient(circle at 50% 60%,rgba(196,181,253,.88),rgba(139,92,246,.78) 62%,rgba(46,16,101,.92) 100%);
  box-shadow:0 0 60px rgba(167,139,250,.38),0 0 140px rgba(139,92,246,.26),inset 0 0 46px rgba(255,255,255,.16);
}
/* 止める = ブルー */
.o-hold{
  background:
    radial-gradient(circle at 38% 32%,rgba(255,255,255,.55),rgba(255,255,255,0) 32%),
    radial-gradient(circle at 50% 60%,rgba(125,211,252,.88),rgba(59,130,246,.78) 62%,rgba(23,37,84,.92) 100%);
  box-shadow:0 0 60px rgba(96,165,250,.38),0 0 140px rgba(59,130,246,.26),inset 0 0 46px rgba(255,255,255,.16);
}
/* 吐く = グリーン */
.o-out{
  background:
    radial-gradient(circle at 38% 32%,rgba(255,255,255,.55),rgba(255,255,255,0) 32%),
    radial-gradient(circle at 50% 60%,rgba(110,231,183,.88),rgba(16,185,129,.78) 62%,rgba(6,58,46,.92) 100%);
  box-shadow:0 0 60px rgba(52,211,153,.38),0 0 140px rgba(16,185,129,.26),inset 0 0 46px rgba(255,255,255,.16);
}
/* 吐ききるほど明るくなるミントのレイヤー（JSが毎フレーム制御） */
.o-out2{
  background:
    radial-gradient(circle at 38% 32%,rgba(255,255,255,.62),rgba(255,255,255,0) 34%),
    radial-gradient(circle at 50% 60%,rgba(209,250,229,.92),rgba(110,231,183,.82) 62%,rgba(16,185,129,.85) 100%);
  box-shadow:0 0 70px rgba(110,231,183,.45),0 0 160px rgba(52,211,153,.3),inset 0 0 50px rgba(255,255,255,.22);
}
.h-out2{background:radial-gradient(circle,rgba(167,243,208,.3),rgba(110,231,183,.12) 50%,transparent 72%)}
.h-in{background:radial-gradient(circle,rgba(167,139,250,.24),rgba(139,92,246,.1) 50%,transparent 72%)}
.h-hold{background:radial-gradient(circle,rgba(96,165,250,.24),rgba(59,130,246,.1) 50%,transparent 72%)}
.h-out{background:radial-gradient(circle,rgba(52,211,153,.24),rgba(16,185,129,.1) 50%,transparent 72%)}
body[data-phase="in"] .o-in,body[data-phase="in"] .h-in,
body[data-phase="hold"] .o-hold,body[data-phase="hold"] .h-hold,
body[data-phase="out"] .o-out,body[data-phase="out"] .h-out{opacity:1}
/* 画面全体がフェーズ色でほのかに呼吸する */
.wash{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity 3s ease}
.w-in{background:radial-gradient(80% 60% at 50% 45%,rgba(139,92,246,.10),transparent 75%)}
.w-hold{background:radial-gradient(80% 60% at 50% 45%,rgba(59,130,246,.10),transparent 75%)}
.w-out{background:radial-gradient(80% 60% at 50% 45%,rgba(16,185,129,.10),transparent 75%)}
body[data-phase="in"] .w-in,body[data-phase="hold"] .w-hold,body[data-phase="out"] .w-out{opacity:1}
.breath-pulse{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(167,139,250,.55);
  opacity:0;transform:scale(1);
}
#grad stop{transition:stop-color 1.8s ease}
.breath-pulse.go{animation:pulse 4s ease-out forwards}
@keyframes pulse{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.8)}}

/* ---------- フェーズ表示 ---------- */
.phase{
  position:absolute;z-index:4;text-align:center;pointer-events:none;
}
.phase .word{
  font-family:'Shippori Mincho',serif;font-size:clamp(26px,7vw,34px);font-weight:600;
  letter-spacing:.3em;text-indent:.3em;color:var(--bg-0);
  text-shadow:0 1px 0 rgba(255,255,255,.25);
  transition:opacity .5s ease, transform .5s ease;
}
.phase .count{
  margin-top:6px;font-size:13px;letter-spacing:.2em;text-indent:.2em;
  color:rgba(4,7,15,.6);font-weight:500;font-variant-numeric:tabular-nums;
}
.phase.idle .word{color:var(--ink);text-shadow:0 0 24px rgba(94,234,212,.4);font-size:clamp(18px,4.6vw,22px)}
.phase.idle .count{color:var(--ink-faint)}
.fade-swap{opacity:0;transform:translateY(6px)}

/* ---------- コントロール ---------- */
.controls{margin-top:64px;display:flex;flex-direction:column;align-items:center;gap:22px;z-index:3}
button.main{
  font-family:inherit;font-size:13px;letter-spacing:.4em;text-indent:.4em;
  color:var(--ink);background:rgba(232,241,242,.05);
  border:1px solid rgba(232,241,242,.18);border-radius:999px;
  padding:15px 52px;cursor:pointer;backdrop-filter:blur(8px);
  transition:background .35s,border-color .35s,box-shadow .35s,transform .15s;
}
button.main:hover{background:rgba(94,234,212,.1);border-color:rgba(94,234,212,.45);box-shadow:0 0 28px rgba(94,234,212,.18)}
button.main:active{transform:scale(.97)}
button.main:focus-visible{outline:2px solid var(--glow-a);outline-offset:4px}

.stats{display:flex;gap:42px}
.stat{text-align:center}
.stat .v{font-family:'Shippori Mincho',serif;font-size:19px;color:var(--ink-dim);font-variant-numeric:tabular-nums;letter-spacing:.08em}
.stat .l{font-size:10px;letter-spacing:.28em;text-indent:.28em;color:var(--ink-faint);margin-top:5px}

.legend{display:flex;gap:24px;font-size:11px;letter-spacing:.16em;color:var(--ink-faint)}
.legend span{display:flex;align-items:center;gap:7px;opacity:.5;transition:opacity .9s,color .9s}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block;transition:box-shadow .9s}
.d-in{background:#a78bfa}.d-hold{background:#60a5fa}.d-out{background:linear-gradient(135deg,#10b981,#a7f3d0)}
body[data-phase="in"] .l-in,body[data-phase="hold"] .l-hold,body[data-phase="out"] .l-out{opacity:1;color:var(--ink-dim)}
body[data-phase="in"] .d-in{box-shadow:0 0 10px rgba(167,139,250,.8)}
body[data-phase="hold"] .d-hold{box-shadow:0 0 10px rgba(96,165,250,.8)}
body[data-phase="out"] .d-out{box-shadow:0 0 10px rgba(52,211,153,.8)}

footer{position:fixed;bottom:22px;left:0;right:0;text-align:center;font-size:10.5px;letter-spacing:.24em;text-indent:.24em;color:var(--ink-faint);z-index:3}

/* ---------- 設定 ---------- */
.gear{
  position:fixed;top:22px;right:20px;z-index:6;
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  background:rgba(232,241,242,.04);border:1px solid rgba(232,241,242,.13);
  color:var(--ink-faint);cursor:pointer;backdrop-filter:blur(8px);
  transition:all .35s;
}
.gear:hover{border-color:rgba(167,139,250,.55);color:var(--ink);box-shadow:0 0 18px rgba(139,92,246,.25)}
.gear:active{transform:scale(.94)}
.sheet{
  position:fixed;inset:0;z-index:10;display:grid;place-items:center;
  background:rgba(4,7,15,.6);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.sheet.open{opacity:1;pointer-events:auto}
.card{
  background:rgba(13,21,38,.94);border:1px solid rgba(232,241,242,.12);
  border-radius:22px;padding:30px 26px;width:min(86vw,340px);
  display:flex;flex-direction:column;gap:16px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.card h2{
  font-family:'Shippori Mincho',serif;font-weight:500;font-size:13px;
  letter-spacing:.4em;text-indent:.4em;color:var(--ink-dim);text-align:center;margin-bottom:4px;
}
.modes{display:flex;flex-direction:column;gap:10px}
button.mode{
  font-family:inherit;font-size:13px;letter-spacing:.1em;text-align:left;
  color:var(--ink-dim);background:rgba(232,241,242,.04);
  border:1px solid rgba(232,241,242,.12);border-radius:14px;
  padding:14px 18px;cursor:pointer;transition:all .3s;
}
button.mode.active{color:var(--ink);border-color:rgba(167,139,250,.55);background:rgba(139,92,246,.14)}
.custom{display:flex;gap:12px;align-items:center;justify-content:center;font-size:11px;color:var(--ink-faint);letter-spacing:.08em;flex-wrap:wrap}
.custom input{
  width:46px;font-family:inherit;font-size:14px;text-align:center;
  color:var(--ink);background:rgba(232,241,242,.06);
  border:1px solid rgba(232,241,242,.16);border-radius:9px;padding:6px 2px;
}
.custom input:focus{outline:none;border-color:rgba(167,139,250,.55)}
.custom button.mode{padding:8px 16px;font-size:11px;border-radius:999px}

@media (prefers-reduced-motion:reduce){
  .aurora{animation:none}
  .breath-pulse.go{animation:none}
}
@media (max-height:640px){
  .controls{margin-top:36px}
  header{top:16px}
  footer{display:none}
}
</style>
</head>
<body data-phase="in">

<div class="aurora"></div>
<div class="wash w-in"></div>
<div class="wash w-hold"></div>
<div class="wash w-out"></div>
<canvas id="stars"></canvas>

<header>
  <h1>息 — IKI</h1>
  <p id="subtitle">4 · 4 · 8 BREATHING</p>
</header>

<main class="app">
  <div class="stage">
    <div class="ring r3"></div>
    <div class="ring r2"></div>
    <div class="ring"></div>

    <svg class="progress" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <circle class="track" cx="50" cy="50" r="49"/>
      <circle class="arc" id="arc" cx="50" cy="50" r="49"
              stroke-dasharray="307.9" stroke-dashoffset="307.9"/>
    </svg>

    <div class="orb-wrap" id="orb">
      <div class="halo h-in"></div>
      <div class="halo h-hold"></div>
      <div class="halo h-out"></div>
      <div class="halo h-out2" id="haloLight"></div>
      <div class="orb o-in"></div>
      <div class="orb o-hold"></div>
      <div class="orb o-out"></div>
      <div class="orb o-out2" id="orbLight"></div>
      <div class="breath-pulse" id="pulse"></div>
    </div>

    <div class="phase idle" id="phase">
      <div class="word" id="word">はじめる</div>
      <div class="count" id="count">心を、いまここに</div>
    </div>
  </div>

  <div class="controls">
    <button class="main" id="btn" aria-label="セッションを開始">開始</button>
    <div class="stats" aria-live="off">
      <div class="stat"><div class="v" id="cycles">0</div><div class="l">サイクル</div></div>
      <div class="stat"><div class="v" id="time">0:00</div><div class="l">経過時間</div></div>
    </div>
    <div class="legend" aria-hidden="true">
      <span class="l-in"><i class="d-in"></i>吸う</span>
      <span class="l-hold"><i class="d-hold"></i>止める</span>
      <span class="l-out"><i class="d-out"></i>吐く</span>
    </div>
  </div>
</main>

<footer>静かな場所で、姿勢を楽に。</footer>

<button class="gear" id="gear" aria-label="呼吸パターン設定">
  <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
    <line x1="1.5" y1="4" x2="15.5" y2="4"/>
    <line x1="1.5" y1="8.5" x2="15.5" y2="8.5"/>
    <line x1="1.5" y1="13" x2="15.5" y2="13"/>
    <circle cx="11" cy="4" r="1.9" fill="#0d1526"/>
    <circle cx="5.5" cy="8.5" r="1.9" fill="#0d1526"/>
    <circle cx="9" cy="13" r="1.9" fill="#0d1526"/>
  </svg>
</button>

<div class="sheet" id="sheet" aria-hidden="true">
  <div class="card">
    <h2>呼吸パターン</h2>
    <div class="modes" role="group" aria-label="呼吸パターン">
      <button class="mode active" data-p="4,4,8">標準 4 · 4 · 8</button>
      <button class="mode" data-p="4,0,6">CPAP向け 4 · 6（息止めなし）</button>
      <button class="mode" id="customBtn">カスタム</button>
    </div>
    <div class="custom" id="customRow" hidden>
      吸う<input id="ci" type="number" inputmode="numeric" min="2" max="15" value="4">
      止める<input id="ch" type="number" inputmode="numeric" min="0" max="15" value="0">
      吐く<input id="co" type="number" inputmode="numeric" min="2" max="20" value="6">
      <button class="mode" id="applyCustom">適用</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ===== 星空 ===== */
const cv = document.getElementById('stars');
const cx = cv.getContext('2d');
let stars = [];
function buildStars(){
  cv.width = innerWidth * devicePixelRatio;
  cv.height = innerHeight * devicePixelRatio;
  cx.scale(devicePixelRatio, devicePixelRatio);
  stars = Array.from({length: Math.min(110, innerWidth/9)}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.1 + .2,
    p: Math.random()*Math.PI*2,
    s: Math.random()*.6 + .25
  }));
}
buildStars();
addEventListener('resize', buildStars);
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
function drawStars(t){
  cx.clearRect(0,0,innerWidth,innerHeight);
  for(const s of stars){
    const a = reduceMotion ? .5 : .25 + .45*(0.5 + 0.5*Math.sin(t/1400*s + s.p));
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(220,235,240,${a})`;
    cx.fill();
  }
}

/* ===== 呼吸エンジン ===== */
function buildPhases(i,h,o){
  return [
    {key:'in',   label:'吸って', dur:i*1000, from:1.0,  to:1.55, yf:-10, yt:0},
    {key:'hold', label:'止めて', dur:h*1000, from:1.55, to:1.55, yf:0,   yt:0},
    {key:'out',  label:'吐いて', dur:o*1000, from:1.55, to:1.0,  yf:0,   yt:-10}
  ].filter(p => p.dur > 0);
}
let PHASES = buildPhases(4,4,8);
let CYCLE = PHASES.reduce((a,p)=>a+p.dur,0);
const ARC_LEN = 307.9;

const orb   = document.getElementById('orb');
const arc   = document.getElementById('arc');
const word  = document.getElementById('word');
const count = document.getElementById('count');
const phaseBox = document.getElementById('phase');
const btn   = document.getElementById('btn');
const pulse = document.getElementById('pulse');
const cyclesEl = document.getElementById('cycles');
const timeEl   = document.getElementById('time');

const orbLight = document.getElementById('orbLight');
const haloLight = document.getElementById('haloLight');

/* ===== 吐く息とともに昇る光の粒 ===== */
let motes = [];
function spawnMote(){
  const rect = orb.getBoundingClientRect();
  const cxp = rect.left + rect.width/2, cyp = rect.top + rect.height/2;
  const a = Math.random()*Math.PI*2, d = rect.width*0.5*(0.55+Math.random()*0.45);
  motes.push({
    x:cxp+Math.cos(a)*d, y:cyp+Math.sin(a)*d*0.8,
    vy:-(0.3+Math.random()*0.45), w:Math.random()*Math.PI*2,
    r:0.8+Math.random()*1.6, life:1
  });
}
function drawMotes(t){
  for(const m of motes){
    m.y += m.vy; m.x += Math.sin(t/600 + m.w)*0.18; m.life -= 0.006;
    cx.beginPath(); cx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(167,243,208,${Math.max(0,m.life)*.8})`;
    cx.shadowColor = 'rgba(110,231,183,.8)'; cx.shadowBlur = 6;
    cx.fill(); cx.shadowBlur = 0;
  }
  motes = motes.filter(m => m.life > 0 && m.y > -10);
}

let running = false;
let startT = 0, pausedAt = 0, elapsedBase = 0;
let lastPhaseKey = null, cycles = 0, lastCycleIdx = -1;
let raf = null;

const easeInOut = t => t<.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;

function setWord(label, swap=true){
  if(!swap){ word.textContent = label; return; }
  word.classList.add('fade-swap');
  setTimeout(()=>{
    word.textContent = label;
    word.classList.remove('fade-swap');
  }, 240);
}

function loop(now){
  drawStars(now);
  drawMotes(now);
  if(running){
    const elapsed = elapsedBase + (now - startT);
    const inCycle = elapsed % CYCLE;
    const cycleIdx = Math.floor(elapsed / CYCLE);

    if(cycleIdx !== lastCycleIdx && cycleIdx > 0 && lastCycleIdx >= 0){
      cycles = cycleIdx;
      cyclesEl.textContent = cycles;
    }
    lastCycleIdx = cycleIdx;

    let acc = 0, phase = PHASES[0], local = 0;
    for(const p of PHASES){
      if(inCycle < acc + p.dur){ phase = p; local = (inCycle - acc) / p.dur; break; }
      acc += p.dur;
    }

    if(phase.key !== lastPhaseKey){
      lastPhaseKey = phase.key;
      document.body.dataset.phase = phase.key;
      const pc = {in:['#c4b5fd','#8b5cf6'],hold:['#7dd3fc','#3b82f6'],out:['#a7f3d0','#10b981']};
      document.querySelector('#grad stop:first-child').setAttribute('stop-color', pc[phase.key][0]);
      document.querySelector('#grad stop:last-child').setAttribute('stop-color', pc[phase.key][1]);
      setWord(phase.label);
      if(phase.key === 'in' && !reduceMotion){
        pulse.classList.remove('go'); void pulse.offsetWidth; pulse.classList.add('go');
      }
    }

    const eased = reduceMotion ? local : easeInOut(local);
    const scale = phase.from + (phase.to - phase.from) * eased;
    const y = reduceMotion ? 0 : (phase.yf + (phase.yt - phase.yf) * eased);
    orb.style.transform = `translateY(${y.toFixed(2)}px) scale(${scale.toFixed(4)})`;

    /* 吐ききるほど、緑が明るく軽くなる */
    if(phase.key === 'out'){
      orbLight.style.transition = 'none'; haloLight.style.transition = 'none';
      orbLight.style.opacity = eased; haloLight.style.opacity = eased;
      if(!reduceMotion && motes.length < 40 && Math.random() < 0.14) spawnMote();
    } else if(parseFloat(orbLight.style.opacity) > 0){
      orbLight.style.transition = 'opacity 2.4s ease'; haloLight.style.transition = 'opacity 2.4s ease';
      orbLight.style.opacity = 0; haloLight.style.opacity = 0;
    }

    const remain = Math.ceil((phase.dur - local*phase.dur)/1000);
    count.textContent = remain;

    arc.style.strokeDashoffset = ARC_LEN * (1 - inCycle / CYCLE);

    const totalSec = Math.floor(elapsed/1000);
    timeEl.textContent = `${Math.floor(totalSec/60)}:${String(totalSec%60).padStart(2,'0')}`;
  }
  raf = requestAnimationFrame(loop);
}
raf = requestAnimationFrame(loop);

btn.addEventListener('click', () => {
  if(!running){
    running = true;
    startT = performance.now();
    phaseBox.classList.remove('idle');
    lastPhaseKey = null;
    btn.textContent = '一時停止';
    btn.setAttribute('aria-label','セッションを一時停止');
    arc.style.opacity = 1;
  } else {
    running = false;
    elapsedBase += performance.now() - startT;
    btn.textContent = '再開';
    btn.setAttribute('aria-label','セッションを再開');
    setWord('一時停止中');
    count.textContent = 'そのままで大丈夫';
  }
});

/* ===== パターン切替 ===== */
const subtitle = document.getElementById('subtitle');
const customRow = document.getElementById('customRow');
const modeBtns = document.querySelectorAll('.mode[data-p]');
const sheet = document.getElementById('sheet');
const gear = document.getElementById('gear');

function openSheet(){ sheet.classList.add('open'); sheet.setAttribute('aria-hidden','false'); }
function closeSheet(){ sheet.classList.remove('open'); sheet.setAttribute('aria-hidden','true'); }
gear.addEventListener('click', openSheet);
sheet.addEventListener('click', e => { if(e.target === sheet) closeSheet(); });

function applyPattern(i,h,o){
  PHASES = buildPhases(i,h,o);
  CYCLE = PHASES.reduce((a,p)=>a+p.dur,0);
  running = false;
  elapsedBase = 0; cycles = 0; lastCycleIdx = -1; lastPhaseKey = null;
  cyclesEl.textContent = '0';
  timeEl.textContent = '0:00';
  orb.style.transform = 'scale(1)';
  arc.style.strokeDashoffset = ARC_LEN;
  document.body.dataset.phase = 'in';
  phaseBox.classList.add('idle');
  setWord('はじめる', false);
  count.textContent = '心を、いまここに';
  btn.textContent = '開始';
  subtitle.textContent = h > 0 ? `${i} · ${h} · ${o} BREATHING` : `${i} · ${o} BREATHING`;
}

modeBtns.forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.mode').forEach(m => m.classList.remove('active'));
  b.classList.add('active');
  customRow.hidden = true;
  const [i,h,o] = b.dataset.p.split(',').map(Number);
  applyPattern(i,h,o);
  closeSheet();
}));

document.getElementById('customBtn').addEventListener('click', e => {
  document.querySelectorAll('.mode').forEach(m => m.classList.remove('active'));
  e.target.classList.add('active');
  customRow.hidden = false;
});

document.getElementById('applyCustom').addEventListener('click', () => {
  const i = Math.min(15, Math.max(2, +document.getElementById('ci').value || 4));
  const h = Math.min(15, Math.max(0, +document.getElementById('ch').value || 0));
  const o = Math.min(20, Math.max(2, +document.getElementById('co').value || 6));
  applyPattern(i,h,o);
  closeSheet();
});
</script>
